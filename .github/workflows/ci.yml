name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Prevent workflow modifications from bypassing checks
permissions:
  contents: read
  pull-requests: read
  checks: write

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Verify package.json scripts haven't been tampered with
      - name: Verify package.json integrity
        run: |
          if ! grep -q '"type-check":.*"tsc --noEmit"' package.json; then
            echo "ERROR: type-check script has been modified!"
            exit 1
          fi
          if ! grep -q '"lint":.*"npm-run-all lint:js lint:css"' package.json; then
            echo "ERROR: lint script has been modified!"
            exit 1
          fi

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Secret scanning
        run: npm run secretlint

      - name: Test
        run: npm run test:ci

      - name: Build
        run: npm run build

      - name: Upload coverage to Codecov
        if: matrix.node-version == '20.x'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: Rareminds-eym/rm-lms
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: true
          verbose: true

      - name: Upload coverage artifacts
        if: matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30
