# Codecov Configuration
# https://docs.codecov.com/docs/codecov-yaml

# Coverage targets
coverage:
  precision: 2
  round: down
  range: '70...100'

  status:
    # Overall project coverage
    project:
      default:
        target: 70%
        threshold: 2%
        if_ci_failed: error

    # Coverage on changed files in PR
    patch:
      default:
        target: 80%
        threshold: 5%
        if_ci_failed: error

# Comment on PRs with coverage report
comment:
  layout: 'reach,diff,flags,tree,footer'
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

# Ignore paths from coverage
ignore:
  - '**/*.test.ts'
  - '**/*.test.tsx'
  - '**/*.spec.ts'
  - '**/*.spec.tsx'
  - '**/setupTests.ts'
  - '**/*.config.js'
  - '**/*.config.ts'
  - 'vite.config.ts'
  - 'vitest.config.ts'
  - 'node_modules/**'
  - 'build/**'
  - 'dist/**'
  - 'coverage/**'
  - 'public/**'
  - 'scripts/**'
  - '.husky/**'
  - '**/*.d.ts'

# Flags for different test types
flags:
  unittests:
    paths:
      - src/
    carryforward: true
